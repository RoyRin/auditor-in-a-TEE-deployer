cvm-version: 0.7.3
memory: 16384
cpus: 4

containers:
  - name: "auditor-agent"
    image: "ghcr.io/royrin/auditor-in-a-tee:v0.0.9@sha256:074f5eb57541117c7ec487de6d647650a5c3df21088336f05c9982a2c0c5b5b8"
    secrets:
      - TINFOIL_API_KEY

shim:
  upstream-port: 8080
  paths:
    - /health
    - /plan
    - /plans
    - /plan/*
    - /plan/*/sign
    - /plan/*/data
    - /plan/*/run
    - /plan/*/results
