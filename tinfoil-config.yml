cvm-version: 0.7.3
memory: 16384
cpus: 4

containers:
  - name: "auditor-agent"
    image: "ghcr.io/royrin/auditor-in-a-tee:v0.0.17@sha256:4e146137834cd98a75a97d693e9f5e08f0c7aad4309caf23e8e8d76a0d517642"
    secrets:
      - TINFOIL_API_KEY

shim:
  upstream-port: 8080
  paths:
    - /health
    - /plan
    - /plans
    - /plans/reset
    - /plan/*
    - /plan/*/sign
    - /plan/*/data
    - /plan/*/data/*
    - /plan/*/run
    - /plan/*/results
