cvm-version: 0.7.3
memory: 16384
cpus: 4

containers:
  - name: "auditor-agent"
    image: "ghcr.io/royrin/auditor-in-a-tee:v0.0.8@sha256:47a98d5d1d721c915ec29a30bbd56454fc5c594581ba0c86a742f32e94f9d9eb"
    secrets:
      - TINFOIL_API_KEY

shim:
  upstream-port: 8080
  paths:
    - /health
    - /plan
    - /plans
    - /plan/*
    - /plan/*/sign
    - /plan/*/data
    - /plan/*/run
    - /plan/*/results
