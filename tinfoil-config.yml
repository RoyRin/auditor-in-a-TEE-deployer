cvm-version: 0.7.3
memory: 16384
cpus: 4

containers:
  - name: "auditor-agent"
    image: "ghcr.io/royrin/auditor-in-a-tee:v0.0.11@sha256:cb10622af71ddccc167b072c7d885fb5ff84273d9c605fdcdff071fb57296abc"
    secrets:
      - TINFOIL_API_KEY

shim:
  upstream-port: 8080
  paths:
    - /health
    - /plan
    - /plans
    - /plan/*
    - /plan/*/sign
    - /plan/*/data
    - /plan/*/data/*
    - /plan/*/run
    - /plan/*/results
