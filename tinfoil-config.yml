cvm-version: 0.7.3
memory: 16384
cpus: 4

containers:
  - name: "auditor-agent"
    image: "ghcr.io/royrin/auditor-in-a-tee:v0.0.14@sha256:8324f6f4086b358fe96a491d5df5df6f3a6c5a572c39d707dd97ab9868371aa4"
    secrets:
      - TINFOIL_API_KEY

shim:
  upstream-port: 8080
  paths:
    - /health
    - /plan
    - /plans
    - /plans/reset
    - /plan/*
    - /plan/*/sign
    - /plan/*/data
    - /plan/*/data/*
    - /plan/*/run
    - /plan/*/results
