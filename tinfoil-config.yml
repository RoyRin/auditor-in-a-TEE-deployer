cvm-version: 0.7.3
memory: 16384
cpus: 4

containers:
  - name: "auditor-agent"
    image: "ghcr.io/royrin/auditor-in-a-tee:v0.0.10@sha256:b48441c6309a346b7702a40e4c2129ed2b1c1c5479971473aca9394b115e2a1b"
    secrets:
      - TINFOIL_API_KEY

shim:
  upstream-port: 8080
  paths:
    - /health
    - /plan
    - /plans
    - /plan/*
    - /plan/*/sign
    - /plan/*/data
    - /plan/*/run
    - /plan/*/results
