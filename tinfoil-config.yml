cvm-version: 0.7.3
memory: 16384
cpus: 4

containers:
  - name: "auditor-agent"
    image: "ghcr.io/royrin/auditor-in-a-tee:v0.0.7@sha256:d94a65b2bf0e661575932e56439c1bcfbac51fa5e40749eee3eb6c0634510456"
    secrets:
      - TINFOIL_API_KEY

shim:
  upstream-port: 8080
  paths:
    - /health
    - /plan
    - /plans
    - /plan/*
    - /plan/*/sign
    - /plan/*/data
    - /plan/*/run
    - /plan/*/results
