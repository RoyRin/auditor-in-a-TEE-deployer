cvm-version: 0.7.3
memory: 16384
cpus: 4

containers:
  - name: "auditor-agent"
    image: "ghcr.io/royrin/auditor-in-a-tee:v0.0.15@sha256:4413e17b674250ae71a6ee1a7159b6213e5b8763299c2f6e388edcb1d35876c4"
    secrets:
      - TINFOIL_API_KEY

shim:
  upstream-port: 8080
  paths:
    - /health
    - /plan
    - /plans
    - /plans/reset
    - /plan/*
    - /plan/*/sign
    - /plan/*/data
    - /plan/*/data/*
    - /plan/*/run
    - /plan/*/results
