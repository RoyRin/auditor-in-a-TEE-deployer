cvm-version: 0.7.3
memory: 16384
cpus: 4

containers:
  - name: "auditor-agent"
    image: "ghcr.io/royrin/auditor-in-a-tee:v0.0.16@sha256:c3527016bad7f1a8375bc73d7fa5b27078f9f64750509d999eef3fc7b0da0be3"
    secrets:
      - TINFOIL_API_KEY

shim:
  upstream-port: 8080
  paths:
    - /health
    - /plan
    - /plans
    - /plans/reset
    - /plan/*
    - /plan/*/sign
    - /plan/*/data
    - /plan/*/data/*
    - /plan/*/run
    - /plan/*/results
