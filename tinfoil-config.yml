cvm-version: 0.7.3
memory: 16384
cpus: 4

containers:
  - name: "auditor-agent"
    image: "ghcr.io/royrin/auditor-in-a-tee:v0.0.5@sha256:254f434c2e607196a3d8e67d59f5df81e323ec6a460c59dbd65e6192e2db4282"
    secrets:
      - TINFOIL_API_KEY

shim:
  upstream-port: 8080
  paths:
    - /health
    - /plan
    - /plan/*
    - /plan/*/sign
    - /plan/*/data
    - /plan/*/run
    - /plan/*/results
